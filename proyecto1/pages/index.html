<!DOCTYPE html>
<html lang="es" data-tema="claro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proyecto 1 - Manipulación DOM</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
  />
  <link rel="stylesheet" href="../style/estilos.css" />
</head>
<body>

  <!-- Barra de navegación -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <span class="navbar-brand fw-bold">Proyecto 1 - DOM</span>
      <button id="btnTema" class="btn btn-outline-light btn-sm ms-auto">
        🌙 Modo Oscuro
      </button>
    </div>
  </nav>

  <div class="container mt-4">
    <h2 class="mb-4 text-center titulo-seccion">Manipulación del DOM</h2>

    <!-- Zona de botones de control -->
    <div class="row g-3 mb-4 justify-content-center">

      <div class="col-6 col-md-4 col-lg-3">
        <button id="btnAgregarH1" class="btn btn-primary w-100">
          ➕ Agregar H1
        </button>
      </div>

      <div class="col-6 col-md-4 col-lg-3">
        <button id="btnCambiarTexto" class="btn btn-secondary w-100">
          ✏️ Cambiar Texto H1
        </button>
      </div>

      <div class="col-6 col-md-4 col-lg-3">
        <label class="visually-hidden" for="inputColor">Color</label>
        <div class="input-group">
          <input type="color" id="inputColor" class="form-control form-control-color" value="#0d6efd" title="Elegir color"/>
          <button id="btnCambiarColor" class="btn btn-info text-white">
            🎨 Color H1
          </button>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-3">
        <button id="btnAgregarImagen" class="btn btn-success w-100">
          🖼️ Agregar Imagen
        </button>
      </div>

      <div class="col-6 col-md-4 col-lg-3">
        <button id="btnCambiarImagen" class="btn btn-warning w-100">
          🔄 Cambiar Imagen
        </button>
      </div>

      <div class="col-6 col-md-4 col-lg-3">
        <div class="input-group">
          <input
            type="number"
            id="inputTamano"
            class="form-control"
            placeholder="px"
            min="50"
            max="800"
          />
          <button id="btnCambiarTamano" class="btn btn-danger">
            📐 Tamaño
          </button>
        </div>
      </div>

    </div>

    <!-- Zona de visualización dinámica -->
    <div id="zonaContenido" class="zona-contenido p-4 rounded border text-center">
      <p class="texto-guia">El contenido aparecerá aquí...</p>
    </div>

    <!-- Indicador de estado -->
    <div id="mensajeEstado" class="mt-3 alert d-none" role="alert"></div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
  </script>
  <script type="module" src="../modules/main.js"></script>
</body>
</html>
