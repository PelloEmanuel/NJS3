<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyecto 1 — Manipulación DOM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/style/styles.css" />
</head>
<body>
  <div class="container py-5">
    <div class="row">
      <div class="col-12">
        <h2 class="page-title mb-4 text-center text-md-start">🧩 Proyecto 1 — Manipulación del DOM</h2>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card-panel p-3 h-100">
          <h5 class="section-title">Texto</h5>
          <div class="d-flex flex-wrap gap-2">
            <button id="btnCrear" class="btn btn-primary w-100 w-sm-auto">Crear &lt;h1&gt;</button>
            <button id="btnCambiarTexto" class="btn btn-secondary w-100 w-sm-auto">Cambiar texto</button>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-6 col-lg-4">
        <div class="card-panel p-3 h-100">
          <h5 class="section-title">Color</h5>
          <div class="row g-2 align-items-center">
            <div class="col-12 col-sm-auto">
              <input type="color" id="colorPicker" class="form-control form-control-color w-100" value="#e63946" title="Elegir color" />
            </div>
            <div class="col-12 col-sm">
              <button id="btnColor" class="btn btn-outline-danger w-100">Cambiar color</button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-12 col-lg-4">
        <div class="card-panel p-3 h-100">
          <h5 class="section-title">Imagen</h5>
          <div class="d-flex flex-wrap gap-2">
            <button id="btnAgregarImg" class="btn btn-success w-100 w-sm-auto">Agregar imagen</button>
            <button id="btnCambiarImg" class="btn btn-warning w-100 w-sm-auto">Cambiar imagen</button>
          </div>
          <div class="row mt-3 g-2 align-items-center">
            <div class="col-12 col-sm-auto">
              <label class="form-label mb-0">Tamaño (px):</label>
            </div>
            <div class="col-12 col-sm">
              <input type="range" id="sliderTamano" class="form-range w-100" min="50" max="400" value="150" />
            </div>
            <div class="col-12 col-sm-auto text-sm-end">
              <span id="labelTamano" class="badge bg-secondary">150px</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row mt-4">
      <div class="col-12">
        <div id="resultado" class="resultado-box w-100"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/modules/main.js"></script>
</body>
</html>
