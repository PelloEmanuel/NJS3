<!DOCTYPE html>
<html lang="es" data-tema="claro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proyecto 6 - Formulario de Registro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../style/estilos.css"/>
</head>
<body>

  <nav class="navbar navbar-dark bg-danger">
    <div class="container">
      <span class="navbar-brand fw-bold">Proyecto 6 - Registro de Personas</span>
      <button id="btnTema" class="btn btn-outline-light btn-sm">🌙 Oscuro</button>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="row g-4">

      <!-- Columna formulario -->
      <div class="col-12 col-lg-5">
        <div class="card p-4 zona-form">
          <h5 class="mb-4">📝 Formulario de Registro</h5>

          <!-- Nombre -->
          <div class="mb-3">
            <label for="inputNombre" class="form-label">Nombre completo: <span class="text-danger">*</span></label>
            <input type="text" id="inputNombre" class="form-control"
              placeholder="Ej: Juan Pérez"/>
            <div id="errorNombre" class="error-campo d-none">El nombre es obligatorio.</div>
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label for="inputEmail" class="form-label">Email: <span class="text-danger">*</span></label>
            <input type="email" id="inputEmail" class="form-control"
              placeholder="ejemplo@correo.com"/>
            <div id="errorEmail" class="error-campo d-none">Ingresá un email válido.</div>
          </div>

          <!-- Edad -->
          <div class="mb-3">
            <label for="inputEdad" class="form-label">Edad: <span class="text-danger">*</span></label>
            <input type="number" id="inputEdad" class="form-control"
              min="1" max="120" placeholder="18"/>
            <div id="errorEdad" class="error-campo d-none">Ingresá una edad entre 1 y 120.</div>
          </div>

          <!-- Género (radio) -->
          <div class="mb-3">
            <label class="form-label">Género: <span class="text-danger">*</span></label>
            <div class="d-flex gap-3 flex-wrap">
              <div class="form-check">
                <input class="form-check-input" type="radio"
                  name="genero" id="radioMasculino" value="Masculino"/>
                <label class="form-check-label" for="radioMasculino">Masculino</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio"
                  name="genero" id="radioFemenino" value="Femenino"/>
                <label class="form-check-label" for="radioFemenino">Femenino</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio"
                  name="genero" id="radioOtro" value="Otro"/>
                <label class="form-check-label" for="radioOtro">Otro</label>
              </div>
            </div>
            <div id="errorGenero" class="error-campo d-none">Seleccioná un género.</div>
          </div>

          <!-- País (select) -->
          <div class="mb-3">
            <label for="selectPais" class="form-label">País: <span class="text-danger">*</span></label>
            <select id="selectPais" class="form-select">
              <option value="">-- Seleccioná --</option>
              <option value="Argentina">Argentina</option>
              <option value="Brasil">Brasil</option>
              <option value="Chile">Chile</option>
              <option value="Uruguay">Uruguay</option>
              <option value="Paraguay">Paraguay</option>
              <option value="Bolivia">Bolivia</option>
              <option value="México">México</option>
              <option value="España">España</option>
              <option value="Otro">Otro</option>
            </select>
            <div id="errorPais" class="error-campo d-none">Seleccioná un país.</div>
          </div>

          <!-- Intereses (checkbox) -->
          <div class="mb-3">
            <label class="form-label">Intereses:</label>
            <div class="row g-2">
              <div class="col-6">
                <div class="form-check">
                  <input class="form-check-input checkbox-interes" type="checkbox"
                    id="chkTecnologia" value="Tecnología"/>
                  <label class="form-check-label" for="chkTecnologia">Tecnología</label>
                </div>
              </div>
              <div class="col-6">
                <div class="form-check">
                  <input class="form-check-input checkbox-interes" type="checkbox"
                    id="chkDeporte" value="Deporte"/>
                  <label class="form-check-label" for="chkDeporte">Deporte</label>
                </div>
              </div>
              <div class="col-6">
                <div class="form-check">
                  <input class="form-check-input checkbox-interes" type="checkbox"
                    id="chkArte" value="Arte"/>
                  <label class="form-check-label" for="chkArte">Arte</label>
                </div>
              </div>
              <div class="col-6">
                <div class="form-check">
                  <input class="form-check-input checkbox-interes" type="checkbox"
                    id="chkCiencia" value="Ciencia"/>
                  <label class="form-check-label" for="chkCiencia">Ciencia</label>
                </div>
              </div>
              <div class="col-6">
                <div class="form-check">
                  <input class="form-check-input checkbox-interes" type="checkbox"
                    id="chkMusica" value="Música"/>
                  <label class="form-check-label" for="chkMusica">Música</label>
                </div>
              </div>
              <div class="col-6">
                <div class="form-check">
                  <input class="form-check-input checkbox-interes" type="checkbox"
                    id="chkViajes" value="Viajes"/>
                  <label class="form-check-label" for="chkViajes">Viajes</label>
                </div>
              </div>
            </div>
          </div>

          <!-- Botones -->
          <div class="d-flex gap-2 mt-2">
            <button id="btnRegistrar" class="btn btn-danger flex-grow-1">
              ✅ Registrar
            </button>
            <button id="btnLimpiar" class="btn btn-outline-secondary">
              🔄 Limpiar
            </button>
          </div>

          <!-- Mensaje de validación global -->
          <div id="mensajeFormulario" class="mt-3 d-none alert"></div>
        </div>
      </div>

      <!-- Columna lista de registros -->
      <div class="col-12 col-lg-7">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="mb-0">
            👥 Personas registradas (<span id="contadorRegistros">0</span>)
          </h5>
          <button id="btnDescargarTxt" class="btn btn-outline-danger btn-sm">
            💾 Descargar .txt
          </button>
        </div>

        <div id="contenedorRegistros" class="contenedor-registros"></div>

        <!-- Modal de edición -->
        <div class="modal fade" id="modalEditarRegistro" tabindex="-1">
          <div class="modal-dialog modal-lg">
            <div class="modal-content zona-form">
              <div class="modal-header">
                <h5 class="modal-title">✏️ Editar registro</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body">
                <input type="hidden" id="editRegistroId"/>
                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label class="form-label">Nombre:</label>
                    <input type="text" id="editNombre" class="form-control"/>
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label">Email:</label>
                    <input type="email" id="editEmail" class="form-control"/>
                  </div>
                  <div class="col-12 col-md-3">
                    <label class="form-label">Edad:</label>
                    <input type="number" id="editEdad" class="form-control"/>
                  </div>
                  <div class="col-12 col-md-4">
                    <label class="form-label">Género:</label>
                    <select id="editGenero" class="form-select">
                      <option value="Masculino">Masculino</option>
                      <option value="Femenino">Femenino</option>
                      <option value="Otro">Otro</option>
                    </select>
                  </div>
                  <div class="col-12 col-md-5">
                    <label class="form-label">País:</label>
                    <select id="editPais" class="form-select">
                      <option value="Argentina">Argentina</option>
                      <option value="Brasil">Brasil</option>
                      <option value="Chile">Chile</option>
                      <option value="Uruguay">Uruguay</option>
                      <option value="Paraguay">Paraguay</option>
                      <option value="Bolivia">Bolivia</option>
                      <option value="México">México</option>
                      <option value="España">España</option>
                      <option value="Otro">Otro</option>
                    </select>
                  </div>
                </div>
              </div>
              <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button id="btnConfirmarEdicion" class="btn btn-danger">Guardar cambios</button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../modules/main.js"></script>
</body>
</html>
