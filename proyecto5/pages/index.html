<!DOCTYPE html>
<html lang="es" data-tema="claro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proyecto 5 - innerHTML dinámico</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../style/estilos.css"/>
</head>
<body>

  <nav class="navbar navbar-dark bg-info">
    <div class="container">
      <span class="navbar-brand fw-bold">Proyecto 5 - innerHTML</span>
      <button id="btnTema" class="btn btn-outline-light btn-sm">🌙 Oscuro</button>
    </div>
  </nav>

  <div class="container mt-4">
    <h2 class="mb-4">Inserción Dinámica con innerHTML</h2>

    <!-- Selector de tipo de elemento -->
    <div class="card p-4 mb-4 zona-card">
      <h5 class="mb-3">➕ Agregar elemento HTML</h5>

      <div class="row g-3 mb-3">
        <div class="col-12 col-md-4">
          <label for="tipoElemento" class="form-label">Tipo de elemento:</label>
          <select id="tipoElemento" class="form-select">
            <option value="parrafo">Párrafo</option>
            <option value="titulo">Título (H2)</option>
            <option value="lista">Lista desordenada</option>
            <option value="tabla">Tabla simple</option>
            <option value="alerta">Alerta Bootstrap</option>
            <option value="imagen">Imagen aleatoria</option>
            <option value="tarjeta">Tarjeta Bootstrap</option>
          </select>
        </div>
        <div class="col-12 col-md-6">
          <label for="inputContenido" class="form-label">Contenido (opcional):</label>
          <input type="text" id="inputContenido" class="form-control"
            placeholder="Texto personalizado..."/>
        </div>
        <div class="col-12 col-md-2 d-flex align-items-end">
          <button id="btnAgregarElemento" class="btn btn-info text-white w-100">
            Agregar
          </button>
        </div>
      </div>

      <div id="mensajeAgregar" class="d-none alert"></div>
    </div>

    <!-- Panel con estadísticas -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="zona-stat text-center p-3 rounded">
          <div class="fs-2 fw-bold text-info" id="statTotal">0</div>
          <small>Total elementos</small>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="zona-stat text-center p-3 rounded">
          <div class="fs-2 fw-bold text-success" id="statUltimo">—</div>
          <small>Último agregado</small>
        </div>
      </div>
    </div>

    <!-- Zona de visualización dinámica -->
    <h5 class="mb-3">Elementos agregados (<span id="contadorElementos">0</span>):</h5>
    <div id="zonaElementos" class="zona-elementos p-3 rounded mb-4"></div>

    <!-- Botón para limpiar todo -->
    <button id="btnLimpiarTodo" class="btn btn-outline-danger mb-4">
      🗑️ Limpiar todos los elementos
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../modules/main.js"></script>
</body>
</html>
