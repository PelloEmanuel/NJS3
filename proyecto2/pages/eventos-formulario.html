<!DOCTYPE html>
<html lang="es" data-tema="claro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eventos Formulario</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../style/estilos.css"/>
</head>
<body>

  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/">← Volver al inicio</a>
      <button id="btnTema" class="btn btn-outline-light btn-sm">🌙 Oscuro</button>
    </div>
  </nav>

  <div class="container mt-4">
    <h2 class="mb-4">📋 Eventos Formulario</h2>

    <div class="row g-4">
      <div class="col-12 col-md-6">
        <div class="card p-4 zona-demo">
          <div class="mb-3">
            <label for="inputLive" class="form-label">Texto en tiempo real (input):</label>
            <input type="text" id="inputLive" class="form-control"
              placeholder="Escribí algo..."/>
          </div>
          <div id="previstaInput" class="zona-previa p-2 rounded">
            Vista previa: <span id="textoPrevia">—</span>
          </div>

          <div class="mb-3 mt-3">
            <label for="selectColor" class="form-label">Seleccioná un color (change):</label>
            <select id="selectColor" class="form-select">
              <option value="">-- Elegí un color --</option>
              <option value="#e74c3c">Rojo</option>
              <option value="#2ecc71">Verde</option>
              <option value="#3498db">Azul</option>
              <option value="#f39c12">Naranja</option>
            </select>
          </div>
          <div id="muestraColor" class="muestra-color rounded mb-3"></div>

          <button id="btnEnviarForm" class="btn btn-primary w-100">
            Enviar formulario (submit)
          </button>
          <div id="mensajeForm" class="mt-2 d-none alert"></div>
        </div>
      </div>

      <div class="col-12 col-md-6">
        <h5>Registro de eventos formulario:</h5>
        <ul id="listaFormulario" class="lista-eventos list-group mt-2"></ul>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../modules/main.js"></script>
</body>
</html>
