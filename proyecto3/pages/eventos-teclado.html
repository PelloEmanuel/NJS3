<!DOCTYPE html>
<html lang="es" data-tema="claro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eventos Teclado</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../style/estilos.css"/>
</head>
<body>

  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/">← Volver al inicio</a>
      <button id="btnTema" class="btn btn-outline-light btn-sm">🌙 Oscuro</button>
    </div>
  </nav>

  <div class="container mt-4">
    <h2 class="mb-4">⌨️ Eventos Teclado</h2>

    <div class="mb-3">
      <label for="campoTeclado" class="form-label">Escribí algo:</label>
      <input
        type="text"
        id="campoTeclado"
        class="form-control"
        placeholder="Cada tecla se registra abajo..."
      />
    </div>

    <div id="zonaTeclado" class="zona-demo p-3 rounded mb-3">
      <p class="mb-1">Última tecla presionada: <strong id="ultimaTecla">—</strong></p>
      <p class="mb-0">Texto acumulado: <strong id="textoAcumulado">—</strong></p>
    </div>

    <h5>Registro de teclas:</h5>
    <ul id="listaTeclas" class="lista-eventos list-group mt-2"></ul>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../modules/main.js"></script>
</body>
</html>
