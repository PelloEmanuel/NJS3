<!DOCTYPE html>
<html lang="es" data-tema="claro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eventos Ratón</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../style/estilos.css"/>
</head>
<body>

  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/">← Volver al inicio</a>
      <button id="btnTema" class="btn btn-outline-light btn-sm">🌙 Oscuro</button>
    </div>
  </nav>

  <div class="container mt-4">
    <h2 class="mb-4">🔵 Eventos Ratón</h2>

    <!-- Zona de seguimiento del ratón -->
    <div id="zonaRaton" class="zona-raton p-4 rounded text-center mb-4">
      <p class="mb-1">Mové el ratón aquí</p>
      <p class="mb-0">
        Posición: X=<strong id="posX">0</strong> | Y=<strong id="posY">0</strong>
      </p>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-12 col-md-6">
        <div id="zonaOver" class="zona-over p-3 rounded text-center">
          Pasá el ratón aquí (mouseover/mouseout)
        </div>
      </div>
      <div class="col-12 col-md-6">
        <div id="zonaDblClick" class="zona-dblclick p-3 rounded text-center">
          Doble clic aquí para cambiar color
        </div>
      </div>
    </div>

    <h5>Registro de eventos ratón:</h5>
    <ul id="listaRaton" class="lista-eventos list-group mt-2"></ul>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../modules/main.js"></script>
</body>
</html>
