<!DOCTYPE html>
<html lang="es" data-tema="claro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eventos Foco</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../style/estilos.css"/>
</head>
<body>

  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/">← Volver al inicio</a>
      <button id="btnTema" class="btn btn-outline-light btn-sm">🌙 Oscuro</button>
    </div>
  </nav>

  <div class="container mt-4">
    <h2 class="mb-4">🎯 Eventos Foco (focus / blur)</h2>

    <div class="row g-3 mb-4">
      <div class="col-12 col-md-6">
        <label for="campo1Foco" class="form-label">Campo Nombre:</label>
        <input type="text" id="campo1Foco" class="form-control campo-foco"
          placeholder="Hacé clic aquí..."/>
        <div id="ayuda1" class="form-text d-none">Ingresá tu nombre completo.</div>
      </div>
      <div class="col-12 col-md-6">
        <label for="campo2Foco" class="form-label">Campo Email:</label>
        <input type="email" id="campo2Foco" class="form-control campo-foco"
          placeholder="Hacé clic aquí..."/>
        <div id="ayuda2" class="form-text d-none">Ingresá un email válido.</div>
      </div>
    </div>

    <div id="zonaFoco" class="zona-demo p-3 rounded mb-3">
      <p class="mb-0">Estado actual: <strong id="estadoFoco">Ningún campo activo</strong></p>
    </div>

    <h5>Registro de focus/blur:</h5>
    <ul id="listaFoco" class="lista-eventos list-group mt-2"></ul>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../modules/main.js"></script>
</body>
</html>
