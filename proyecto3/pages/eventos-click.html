<!DOCTYPE html>
<html lang="es" data-tema="claro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eventos Click</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../style/estilos.css"/>
</head>
<body>

  <nav class="navbar navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/">← Volver al inicio</a>
      <button id="btnTema" class="btn btn-outline-light btn-sm">🌙 Oscuro</button>
    </div>
  </nav>

  <div class="container mt-4">
    <h2 class="mb-4">🖱️ Eventos Click</h2>

    <div class="row g-3 mb-4">
      <div class="col-12 col-md-4">
        <button id="btnContar" class="btn btn-primary w-100">
          Contar clics
        </button>
      </div>
      <div class="col-12 col-md-4">
        <button id="btnCambiarFondo" class="btn btn-secondary w-100">
          Cambiar fondo
        </button>
      </div>
      <div class="col-12 col-md-4">
        <button id="btnReset" class="btn btn-danger w-100">
          Reiniciar
        </button>
      </div>
    </div>

    <div id="zonaClick" class="zona-demo p-4 rounded text-center">
      <p id="textoContador" class="fs-3 mb-2">Clics: <strong>0</strong></p>
      <p id="textoFondo" class="mb-0 texto-secundario">Fondo actual: blanco</p>
    </div>

    <!-- Lista de eventos registrados -->
    <h5 class="mt-4">Registro de eventos:</h5>
    <ul id="listaEventosClick" class="lista-eventos list-group mt-2"></ul>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../modules/main.js"></script>
</body>
</html>
