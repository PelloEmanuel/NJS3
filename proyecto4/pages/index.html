<!DOCTYPE html>
<html lang="es" data-tema="claro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proyecto 4 - Nodos &lt;a&gt;</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="../style/estilos.css"/>
</head>
<body>

  <nav class="navbar navbar-dark bg-warning">
    <div class="container">
      <span class="navbar-brand fw-bold text-dark">Proyecto 4 - Nodos &lt;a&gt;</span>
      <button id="btnTema" class="btn btn-outline-dark btn-sm">🌙 Oscuro</button>
    </div>
  </nav>

  <div class="container mt-4">
    <h2 class="mb-4">Gestión de Nodos &lt;a&gt;</h2>

    <!-- Formulario CRUD -->
    <div class="card p-4 mb-4 zona-form">
      <h5 class="mb-3">➕ Crear nuevo enlace</h5>
      <div class="row g-3">
        <div class="col-12 col-md-4">
          <label for="inputEtiqueta" class="form-label">Etiqueta del enlace:</label>
          <input type="text" id="inputEtiqueta" class="form-control"
            placeholder="Ej: Google"/>
        </div>
        <div class="col-12 col-md-5">
          <label for="inputHref" class="form-label">URL (href):</label>
          <input type="url" id="inputHref" class="form-control"
            placeholder="https://..."/>
        </div>
        <div class="col-12 col-md-3 d-flex align-items-end">
          <button id="btnCrearNodo" class="btn btn-warning w-100 text-dark fw-bold">
            Crear enlace
          </button>
        </div>
      </div>
      <div id="mensajeCrear" class="mt-3 d-none alert"></div>
    </div>

    <!-- Panel de registro de cambios -->
    <div class="card p-3 mb-4 zona-form">
      <h5 class="mb-2">📋 Registro de cambios</h5>
      <ul id="listaRegistro" class="lista-registro list-group"></ul>
    </div>

    <!-- Lista dinámica de nodos -->
    <h5 class="mb-3">🔗 Nodos creados (<span id="contadorNodos">0</span>):</h5>
    <div id="contenedorNodos" class="row g-3"></div>

    <!-- Modal de edición -->
    <div class="modal fade" id="modalEdicion" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content zona-form">
          <div class="modal-header">
            <h5 class="modal-title">✏️ Editar enlace</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="editId"/>
            <div class="mb-3">
              <label for="editEtiqueta" class="form-label">Etiqueta:</label>
              <input type="text" id="editEtiqueta" class="form-control"/>
            </div>
            <div class="mb-3">
              <label for="editHref" class="form-label">URL:</label>
              <input type="url" id="editHref" class="form-control"/>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
              Cancelar
            </button>
            <button id="btnGuardarEdicion" type="button" class="btn btn-warning">
              Guardar cambios
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../modules/main.js"></script>
</body>
</html>
