<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyecto 4 — Atributos Dinámicos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/style/styles.css" />
  <style>
    .page-header {
      text-align: center;
    }
    .label-tag {
      display: inline-block;
      background: #0d6efd;
      color: #fff;
      padding: 5px 10px;
      border-radius: 5px;
      margin-bottom: 10px;
    }
    .page-title {
      font-size: 2rem;
    }
    .page-sub {
      color: #6c757d;
    }
    .control-panel {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
    }
    .links-panel, .log-panel {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
    }
    .panel-title {
      margin-bottom: 15px;
    }
    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
    }
    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .log-body {
      margin-top: 10px;
      max-height: 300px;
      overflow-y: auto;
      background: #fff;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="page-header mb-5">
      <span class="label-tag">Proyecto 4</span>
      <h1 class="page-title">Modificación de Atributos</h1>
      <p class="page-sub">Generá y editá los atributos <code>href</code> de enlaces dinámicamente.</p>
    </div>

    <div class="control-panel mb-4">
      <div class="container-fluid">
        <div class="row g-3 align-items-end">
          <div class="col-12 col-md-4">
            <label class="form-label">Seleccionar enlace</label>
            <select id="selectEnlace" class="form-select">
            </select>
          </div>
          <div class="col-12 col-md-5">
            <label class="form-label">Nuevo valor de href</label>
            <input type="text" id="inputHref" class="form-control" placeholder="https://nuevo-sitio.com" />
          </div>
          <div class="col-12 col-md-3">
            <button id="btnModificar" class="btn btn-primary w-100">Modificar href</button>
          </div>
        </div>
      </div>
    </div>

    <div class="links-panel mb-5">
      <h3 class="panel-title">🔗 Enlaces generados</h3>
      <div id="links-container" class="links-grid"></div>
    </div>

    <div class="log-panel">
      <div class="log-header">
        <h3 class="panel-title">📋 Historial de cambios</h3>
        <button id="btnLimpiarLog" class="btn btn-outline-secondary">Limpiar</button>
      </div>
      <div id="log-container" class="log-body">
        <span class="empty-msg">Aún no hay cambios registrados...</span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/modules/main.js"></script>
</body>
</html>
